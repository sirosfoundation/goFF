sources:
  - id: federation
    entities:
      - https://idp.example.org/idp
      - https://sp.example.org/sp

pipeline:
  - load:
      source: federation
  - select:
      entities:
        - https://idp.example.org/idp
  - finalize:
      Name: https://metadata.example.org/aggregate
      cacheDuration: PT5H
      validUntil: P10D
  - publish:
      output: aggregate.xml
