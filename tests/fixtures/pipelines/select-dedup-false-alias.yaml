sources:
  - id: fedA
    files:
      - ../metadata/select-fed-a.xml
  - id: fedB
    files:
      - ../metadata/select-fed-b.xml
pipeline:
  - load:
      source: fedA
  - select as /sp-dupes dedup false:
      selectors:
        - fedB!//md:EntityDescriptor[md:SPSSODescriptor]
        - https://sp.example.org/sp
  - publish:
      output: select-dedup-false.txt
