version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly
  tests: true

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/sirosfoundation/goff

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
