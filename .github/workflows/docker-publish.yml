name: Build and Publish Docker Image

on:
  push:
    branches: [main]
    tags: ['v[0-9]+.[0-9]+.[0-9]+*']
  pull_request:
    branches: [main]

jobs:
  docker:
    uses: sirosfoundation/.github/.github/workflows/docker-build-push.yml@main
    permissions:
      contents: read
      packages: write
      security-events: write
    with:
      image-name: sirosfoundation/goff
