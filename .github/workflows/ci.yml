name: CI
permissions:
  contents: read

on:
  push:
    paths:
      - "**"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.10.0

      - name: Test
        run: go test -race ./...

      - name: Coverage gate (≥70%)
        run: |
          go test -coverprofile=cover.out ./...
          TOTAL=$(go tool cover -func=cover.out | awk '/^total:/ {gsub(/%/, ""); print $3}')
          echo "Total coverage: ${TOTAL}%"
          awk "BEGIN { if (${TOTAL} < 70.0) { print \"Coverage ${TOTAL}% is below 70% gate\"; exit 1 } }"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./cover.out
          flags: unittests
          name: codecov-goFF
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Fuzz smoke (30 s per target)
        run: |
          go test -run '^$$' -fuzz FuzzParseMetadataFromXML -fuzztime 30s ./internal/pipeline
          go test -run '^$$' -fuzz FuzzParseEntityXMLByID   -fuzztime 30s ./internal/pipeline
          go test -run '^$$' -fuzz FuzzParsePipelineYAML    -fuzztime 30s ./internal/pipeline
